name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what went wrong. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a PBIX with ...
        2. Call pbix_create with ...
        3. Open in PBI Desktop ...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - PBIX Creation (builder)
        - Data Sources (CSV/SQLite/SQL Server/MySQL/PostgreSQL)
        - DirectQuery
        - DAX Evaluation
        - Report Layout / Visuals
        - DataModel Read/Write
        - File Open/Save
        - MCP Server
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pbix-mcp version
      placeholder: "0.2.0"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
