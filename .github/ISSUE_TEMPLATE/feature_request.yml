name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DAX engine
        - MCP tools
        - File format support
        - CLI / packaging
        - Documentation
        - Other
