name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy (baseline: 148 errors)
        run: |
          error_count=$(mypy src/pbix_mcp/ --ignore-missing-imports --no-error-summary 2>&1 | grep -c "error:" || true)
          echo "mypy found $error_count errors (baseline: 148)"
          if [ "$error_count" -gt 148 ]; then
            echo "::error::mypy error count ($error_count) exceeds baseline (148). Fix new type errors before merging."
            exit 1
          fi

      - name: Run unit tests with coverage
        # 28% baseline — server.py is 6% (MCP tools can't be unit tested easily).
        # Threshold guards against regression; increase as more tests are added.
        run: pytest -m "not slow and not integration" -v --tb=short --cov=src/pbix_mcp --cov-report=term-missing --cov-fail-under=28

      - name: Build package
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl --force-reinstall --no-deps
          python -c "from pbix_mcp.server import mcp; print('Import OK')"
