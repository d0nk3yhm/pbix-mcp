name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy (non-blocking, ~239 errors)
        run: mypy src/pbix_mcp/ --ignore-missing-imports --no-error-summary || true
        # 239 errors as of v0.1.0 — tracked for gradual cleanup. Will block CI at v0.2.0.

      - name: Run unit tests with coverage
        # Coverage threshold: server.py is an MCP server (7% from unit tests alone),
        # so overall coverage is low. Threshold will increase as more tests are added.
        run: pytest -m "not slow and not integration" -v --tb=short --cov=src/pbix_mcp --cov-report=term-missing --cov-fail-under=25

      - name: Build package
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl --force-reinstall --no-deps
          python -c "from pbix_mcp.server import mcp; print('Import OK')"
