name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy (baseline 175 errors, fail if new errors added)
        shell: bash
        run: |
          COUNT=$(mypy src/pbix_mcp/ --ignore-missing-imports --no-error-summary 2>&1 | grep -c "error:" || true)
          echo "mypy errors: $COUNT (baseline: 175)"
          if [ "$COUNT" -gt 175 ]; then
            echo "FAIL: mypy errors ($COUNT) exceed baseline (175)"
            exit 1
          fi

      - name: Run unit tests with coverage
        run: pytest -m "not slow and not integration" -v --tb=short --cov=src/pbix_mcp --cov-report=term-missing --cov-fail-under=30

      - name: Build package
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl --force-reinstall --no-deps
          python -c "from pbix_mcp.server import mcp; print('Import OK')"
